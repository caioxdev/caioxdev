<svg width="600" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad">
      <stop offset="0%" stop-color="#002E6E"></stop>
      <stop offset="70%" stop-color="#007BFF"></stop>
      <stop offset="100%" stop-color="#00BFA5"></stop>
    </linearGradient>

    <mask id="typing-mask">
      <rect x="0" y="0" width="0" height="80" fill="white">
        <animate attributeName="width" from="0" to="600" dur="3s" fill="freeze"></animate>
      </rect>
    </mask>
  </defs>

  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="Fira Code" font-size="32" font-weight="600" fill="url(#grad)" mask="url(#typing-mask)">
    👋 Olá, eu sou o Caio
  </text>

  <rect x="490" y="20" width="3" height="40" fill="white">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"></animate>
  </rect>
</svg>